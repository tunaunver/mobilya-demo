<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Giriş Yap</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        aura: {
                            gold: '#C5A880',
                            dark: '#1A1A1A',
                            light: '#F9F9F9'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Auth & Logic -->
    <script src="js/auth-manager.js"></script>
    <script src="js/store-logic.js"></script>
</head>
<body class="bg-aura-light min-h-screen flex items-center justify-center p-6 font-sans">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl shadow-gray-200/50 overflow-hidden flex flex-col">
        <!-- Header -->
        <div class="p-10 text-center border-b border-gray-50">
            <a href="index.html" class="text-3xl font-serif text-gray-900 tracking-widest uppercase mb-4 block">AURA</a>
            <h2 class="text-xl font-medium text-gray-900">Hoş Geldiniz</h2>
            <p class="text-sm text-gray-500 mt-2 font-light">Hesabınıza giriş yaparak devam edin.</p>
        </div>

        <!-- Form -->
        <div class="p-10 space-y-6">
            <div id="auth-error" class="hidden bg-red-50 text-red-600 text-xs p-4 rounded-xl border border-red-100 italic"></div>
            
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 ml-1">E-Posta Adresi</label>
                    <input type="email" id="email" required 
                        class="w-full px-5 py-4 bg-gray-50 border border-transparent rounded-2xl focus:bg-white focus:border-aura-gold focus:ring-4 focus:ring-aura-gold/5 transition-all text-sm outline-none"
                        placeholder="isim@ornek.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 ml-1">Şifre</label>
                    <input type="password" id="password" required 
                        class="w-full px-5 py-4 bg-gray-50 border border-transparent rounded-2xl focus:bg-white focus:border-aura-gold focus:ring-4 focus:ring-aura-gold/5 transition-all text-sm outline-none"
                        placeholder="••••••••">
                </div>
                <div class="flex justify-end">
                    <a href="#" class="text-[10px] font-bold uppercase tracking-widest text-aura-gold hover:text-gray-900 transition-colors">Şifremi Unuttum</a>
                </div>
                <button type="submit" 
                    class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-black transition-all shadow-xl shadow-gray-900/10 active:scale-[0.98]">
                    Giriş Yap
                </button>
            </form>

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase font-bold tracking-widest text-gray-400">
                    <span class="bg-white px-4">Veya</span>
                </div>
            </div>

            <!-- Google Login -->
            <button id="google-login-btn" 
                class="w-full py-4 border border-gray-100 bg-white text-gray-900 rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-gray-50 transition-all flex items-center justify-center space-x-3 active:scale-[0.98]">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">
                <span>Google ile Giriş Yap</span>
            </button>
        </div>

        <!-- Footer -->
        <div class="p-8 bg-gray-50/50 text-center border-t border-gray-50">
            <p class="text-xs text-gray-500">Hesabınız yok mu? 
                <a href="register.html" class="text-aura-gold font-bold hover:text-gray-900 transition-colors ml-1 uppercase tracking-widest">Kayıt Olun</a>
            </p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const googleBtn = document.getElementById('google-login-btn');
        const errorDiv = document.getElementById('auth-error');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await AuthManager.signIn(email, password);
            
            if (error) {
                errorDiv.innerText = error.message;
                errorDiv.classList.remove('hidden');
            } else {
                const theme = StoreLogic.getActiveTheme();
                window.location.href = (theme?.layout === 'theme2' || theme?.id === 'theme-premium') ? 'theme2-index.html' : 'index.html';
            }
        });

        googleBtn.addEventListener('click', async () => {
            const { error } = await AuthManager.signInWithGoogle();
            if (error) {
                errorDiv.innerText = error.message;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
